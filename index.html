<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFT Viewer Pro</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* Card */
.card {
  width: 320px;
  background: #6ee7b7;
  border-radius: 20px;
  padding: 15px;
  position: relative;
}

/* NFT container */
.nft-box {
  position: relative;
}

/* NFT Image */
.nft-img {
  width: 100%;
  border-radius: 15px;
}

/* Overlay Buttons */
.overlay-buttons {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 10px;
}

.btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: none;
  background: rgba(0,0,0,0.4);
  color: white;
  cursor: pointer;
  font-size: 14px;
  backdrop-filter: blur(5px);
  transition: 0.3s;
}

/* Glow animation */
.btn.active {
  background: rgba(0,0,0,0.7);
  box-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 5px #00f7ff; }
  50% { box-shadow: 0 0 20px #00f7ff; }
  100% { box-shadow: 0 0 5px #00f7ff; }
}

/* Coming Soon */
.coming {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 24px;
  font-weight: bold;
  color: #0f172a;
  display: none;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}
</style>
</head>

<body>

<div class="card">

  <div class="nft-box">

    <!-- Buttons on top -->
    <div class="overlay-buttons">
      <button id="orgBtn" class="btn active">ORG</button>
      <button id="idBtn" class="btn">ID</button>
    </div>

    <!-- NFT -->
    <img id="nftImage" class="nft-img"
    src="https://raw.githubusercontent.com/nftvier/nftvier.github.io/main/1.gif">

    <!-- Coming Soon -->
    <div id="comingText" class="coming">Coming Soon...</div>

  </div>

</div>

<script>
const orgBtn = document.getElementById("orgBtn");
const idBtn = document.getElementById("idBtn");
const nftImage = document.getElementById("nftImage");
const comingText = document.getElementById("comingText");

orgBtn.onclick = () => {
  orgBtn.classList.add("active");
  idBtn.classList.remove("active");

  nftImage.style.opacity = "1";
  comingText.style.display = "none";
};

idBtn.onclick = () => {
  idBtn.classList.add("active");
  orgBtn.classList.remove("active");

  nftImage.style.opacity = "0.3";
  comingText.style.display = "block";
};
</script>

</body>
</html>
